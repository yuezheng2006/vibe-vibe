# .cnb.yml
$:
  vscode:
    - runner:
        cpus: 8
      docker:
        image: docker.cnb.cool/nfeyre/default-dev-env:latest
      services:
        - vscode
        - docker
      env:
        CNB_WELCOME_CMD: |
          npx @z_ai/coding-helper
      # 开发环境启动后会执行的任务
      imports:
        - https://cnb.cool/nfeyre/secret/-/blob/main/edgeone-pages-env.yml
        - https://cnb.cool/nfeyre/secret/-/blob/main/dk.yml
      stages:
        - name: start 1P
          script: 1pctl start all
        - name: install env
          script: pnpm install 

master:
  push:
    - &docs_deploy_pipeline
      imports:
        - https://cnb.cool/nfeyre/secret/-/blob/main/edgeone-pages-env.yml
      runner:
        cpus: 8
      docker:
        image: docker.cnb.cool/nfeyre/default-dev-env:latest
      env:
        EDGEONE_PROJECT_NAME: vibe-vibe-production
      
      stages:
        - &docs_build_stage
          name: Build Site
          script:
            - pnpm install --frozen-lockfile
            - pnpm build
        - &edgeone_deploy_stage
          name: Deploy to EdgeOne Pages
          script:
            - npx -y edgeone pages deploy ./docs/.vitepress/dist -n $EDGEONE_PROJECT_NAME --force -t $EDGEONE_API_TOKEN

develop:
  push:
    - <<: *docs_deploy_pipeline
      env:
        EDGEONE_PROJECT_NAME: vibe-vibe-develop
      stages:
        - *docs_build_stage
        - *edgeone_deploy_stage
  pull_request:
    - name: pr-build
      runner:
        cpus: 8
      docker:
        image: docker.cnb.cool/nfeyre/default-dev-env:latest
      stages:
        - name: prepare pnpm
          script:
            - corepack enable
            - corepack prepare pnpm@10.21.0 --activate
        - name: install
          script:
            - pnpm install --frozen-lockfile
        - name: build
          script:
            - pnpm build
  pull_request.mergeable:
    - name: pr-auto-merge
      runner:
        cpus: 8
      docker:
        image: docker.cnb.cool/nfeyre/default-dev-env:latest
      stages:
        - name: auto merge
          type: git:auto-merge
          options:
            mergeType: squash
            mergeCommitMessage: $CNB_LATEST_COMMIT_MESSAGE
            removeSourceBranch: true
            ignoreAssignee: true
